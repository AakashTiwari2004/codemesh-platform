<div class="auth-layout container">
  <section class="auth-hero">
    <p class="eyebrow">CodeMesh Judge</p>
    <h1>Compete with confidence</h1>
    <p>
      Run code, review results, and submit faster. Secure login now includes human verification.
    </p>
  </section>

  <section class="card auth-panel">
    <h2>Welcome back</h2>

    <label for="username">Username or Email</label>
    <input id="username" type="text" [(ngModel)]="username" placeholder="Enter username or email" />

    <label for="password">Password</label>
    <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="Enter password" />
    <label class="field-inline" for="show-password-login">
      <input id="show-password-login" type="checkbox" [(ngModel)]="showPassword" />
      Show password
    </label>

    <div class="verification-box">
      <label class="field-inline" for="human-check-login">
        <input id="human-check-login" type="checkbox" [(ngModel)]="humanChecked" />
        I am human
      </label>
      <p class="challenge">Solve: <strong>{{ challengeText }}</strong></p>
      <input type="number" [(ngModel)]="humanAnswer" placeholder="Enter answer" />
      <button type="button" class="btn-secondary" (click)="refreshChallenge()">New Challenge</button>
    </div>

    <button class="btn" (click)="login()" [disabled]="loading || !username || !password">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="success" *ngIf="info">{{ info }}</p>
    <p class="error" *ngIf="error">{{ error }}</p>
    <p class="hint">New user? <a routerLink="/signup">Create account</a></p>
  </section>
</div>
